<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena Layout Architect v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --border: #334155;
            --accent: #3b82f6;
            --success: #22c55e;
        }
        body { 
            background-color: var(--bg); 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif;
        }
        .panel { background-color: var(--panel); border: 1px solid var(--border); }
        .slot { 
            border: 2px dashed var(--border); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            background: rgba(15, 23, 42, 0.5);
        }
        .slot:hover { 
            border-color: var(--accent); 
            background-color: rgba(59, 130, 246, 0.1); 
            transform: scale(1.01);
        }
        .slot.mapped { 
            border-color: var(--success); 
            border-style: solid; 
            background-color: rgba(34, 197, 94, 0.1); 
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.1);
        }
        .draggable-field { 
            cursor: grab; 
            background: #334155; 
            padding: 8px 12px; 
            margin: 6px 0; 
            border-radius: 8px; 
            border: 1px solid var(--border); 
            font-size: 0.75rem;
            transition: all 0.2s;
        }
        .draggable-field:hover {
            background: #475569;
            border-color: var(--accent);
            transform: translateX(4px);
        }
        .draggable-field:active { cursor: grabbing; }
        
        .type-btn {
            @apply w-full text-left p-4 rounded-xl border border-border bg-slate-800/50 hover:bg-accent/20 hover:border-accent transition-all font-bold flex justify-between items-center;
        }

        /* Wave Divider Preview */
        .wave-preview {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 20px;
            background: var(--bg); clip-path: polygon(0 100%, 100% 100%, 100% 0, 85% 45%, 70% 0, 55% 45%, 40% 0, 25% 45%, 10% 0, 0 45%);
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- TYPE SELECTION MODAL -->
    <div id="type-modal" class="fixed inset-0 bg-slate-950/90 z-[100] flex items-center justify-center backdrop-blur-md">
        <div class="bg-panel p-10 rounded-3xl shadow-2xl text-center max-w-lg w-full border border-border">
            <div class="w-20 h-20 bg-accent/20 rounded-full flex items-center justify-center mx-auto mb-6 text-accent text-3xl">
                <i class="fa-solid fa-compass-drafting"></i>
            </div>
            <h2 class="text-3xl font-black mb-2 font-serif">Sitetype Kiezen</h2>
            <p class="text-slate-400 mb-8">Selecteer de architectuur die u wilt ontwerpen</p>
            <div id="type-list" class="grid gap-4 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                <p class="animate-pulse">Architecturen laden...</p>
            </div>
        </div>
    </div>

    <!-- HEADER -->
    <header class="h-20 bg-slate-900 border-b border-border flex items-center justify-between px-8 shrink-0 z-50">
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-3">
                <span class="w-10 h-10 bg-accent rounded-xl flex items-center justify-center text-white shadow-lg shadow-accent/20">
                    <i class="fa-solid fa-bolt"></i>
                </span>
                <h1 class="text-xl font-black tracking-tighter uppercase">Athena <span class="text-accent">Layout</span></h1>
            </div>
            <span id="sitetype-badge" class="px-4 py-1.5 bg-slate-800 border border-border rounded-full text-[10px] font-bold text-accent tracking-widest uppercase">...</span>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="triggerAiSuggest()" class="text-slate-400 hover:text-white px-4 py-2 rounded-xl transition-all text-sm font-medium flex items-center gap-2">
                <i class="fa-solid fa-wand-magic-sparkles"></i> AI Voorstel
            </button>
            <div class="h-8 w-[1px] bg-border"></div>
            <button id="gen-btn" onclick="saveLayout()" class="bg-accent hover:bg-blue-500 text-white px-8 py-2.5 rounded-xl font-bold shadow-xl shadow-accent/20 flex items-center gap-3 transition-all hover:scale-[1.02] active:scale-95">
                <i class="fa-solid fa-rocket"></i> Genereren
            </button>
        </div>
    </header>

    <!-- MAIN WORKSPACE -->
    <div class="flex-1 flex overflow-hidden">
        
        <!-- LEFT: DATA SOURCE -->
        <aside class="w-80 panel flex flex-col border-y-0 border-l-0 shadow-2xl z-40">
            <div class="p-6 border-b border-border bg-slate-800/30">
                <h3 class="font-bold text-slate-200 flex items-center gap-2">
                    <i class="fa-solid fa-database text-accent"></i> Blueprint Data
                </h3>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest mt-1">Sleep velden naar het canvas</p>
            </div>
            <div id="data-fields" class="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar">
                <!-- Wordt gevuld via JS -->
            </div>
        </aside>

        <!-- CENTER: VISUAL EDITOR -->
        <main class="flex-1 bg-slate-950 overflow-y-auto p-12 relative custom-scrollbar">
            <div class="max-w-4xl mx-auto space-y-12 pb-32">
                
                <!-- SETTINGS BAR -->
                <div class="panel p-8 rounded-3xl border border-border flex flex-col md:flex-row gap-6 mb-12 shadow-2xl relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-1 h-full bg-accent"></div>
                    <div class="flex-1">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Layout Naam</label>
                        <input type="text" id="layout-name" class="w-full bg-slate-900 border border-border rounded-xl p-3 text-sm focus:border-accent outline-none transition-colors" placeholder="bv. modern-dark">
                    </div>
                    <div class="flex-1">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">AI Styling Prefs</label>
                        <input type="text" id="style-prefs" class="w-full bg-slate-900 border border-border rounded-xl p-3 text-sm focus:border-accent outline-none transition-colors" placeholder="bv. donker, minimalistisch, glas-effect">
                    </div>
                    <div class="w-48">
                         <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Generator</label>
                         <select id="gen-mode" class="w-full bg-slate-900 border border-border rounded-xl p-3 text-sm focus:border-accent outline-none transition-colors">
                             <option value="standard">⚡ Standaard (Gratis)</option>
                             <option value="ai-style">🎨 Hybride (AI Style)</option>
                             <option value="ai-full">🤖 AI Architect (Full)</option>
                         </select>
                    </div>
                </div>

                <!-- PREVIEW CANVAS (WIREFRAME) -->
                <div id="canvas" class="space-y-12">
                    
                    <!-- HEADER COMPONENT -->
                    <div class="panel rounded-3xl relative overflow-hidden group min-h-[300px] flex flex-col shadow-2xl border-2 border-transparent hover:border-accent/30 transition-all">
                        <div class="absolute top-4 left-4 z-20">
                            <span class="px-3 py-1 bg-accent text-white text-[10px] font-black uppercase tracking-widest rounded-full">Header Slot</span>
                        </div>
                        
                        <div class="flex-1 bg-slate-800/50 flex flex-col items-center justify-center p-12 text-center relative">
                            <div class="slot w-full h-16 max-w-2xl flex items-center justify-center rounded-2xl mb-4" data-slot="header_title">
                                <span class="text-slate-500 text-xs font-bold uppercase tracking-widest">Sleep Hoofdtitel Hier</span>
                            </div>
                            <div class="slot w-2/3 h-10 flex items-center justify-center rounded-xl mb-8" data-slot="header_subtitle">
                                <span class="text-slate-500 text-[10px] uppercase tracking-widest">Sleep Subtitel Hier</span>
                            </div>
                            <div class="slot w-40 h-12 flex items-center justify-center rounded-full bg-accent/10 border-accent/30" data-slot="hero_action">
                                <span class="text-accent text-[10px] font-black uppercase tracking-tighter">CTA Link / Knop</span>
                            </div>
                            <div class="wave-preview opacity-50"></div>
                        </div>
                    </div>

                    <!-- SECTIONS SLOT (REPEATER) -->
                    <div class="relative group">
                        <div class="absolute -top-4 left-1/2 -translate-x-1/2 z-20">
                            <span class="px-4 py-1.5 bg-success text-white text-[10px] font-black uppercase tracking-widest rounded-full shadow-lg shadow-success/20">Repeater Secties</span>
                        </div>
                        
                        <div id="sections-container" class="min-h-[250px] bg-slate-900/50 rounded-[2.5rem] border-4 border-dashed border-slate-800 p-8 space-y-4 flex flex-col transition-all group-hover:border-success/30" data-slot-type="array" data-slot="sections">
                            <div class="flex-1 flex flex-col items-center justify-center text-center opacity-30 pointer-events-none">
                                <i class="fa-solid fa-layer-group text-4xl mb-4"></i>
                                <p class="text-sm font-bold uppercase tracking-widest">Sleep tabellen hierheen om pagina-secties te genereren</p>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script>
        let blueprint = null;
        let mapping = { sections: [] };

        // --- INIT ---
        async function init() {
            try {
                const res = await fetch('/api/blueprint');
                if (res.status === 400) {
                    loadTypeSelection();
                } else {
                    const data = await res.json();
                    loadEditor(data);
                }
            } catch (e) { console.error(e); }
        }

        async function loadTypeSelection() {
            const res = await fetch('/api/types');
            const types = await res.json();
            const container = document.getElementById('type-list');
            
            if (types.length === 0) {
                container.innerHTML = "<p class='text-red-500'>Geen sitetypes gevonden.</p>";
                return;
            }

            container.innerHTML = types.map(t => `
                <button onclick="selectType('${t}')" class="type-btn group">
                    <span>${t.toUpperCase()}</span>
                    <i class="fa-solid fa-chevron-right text-slate-600 group-hover:text-accent group-hover:translate-x-1 transition-all"></i>
                </button>
            `).join('');
        }

        async function selectType(type) {
            await fetch('/api/set-type', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ type })
            });
            document.getElementById('type-modal').style.display = 'none';
            init();
        }

        function loadEditor(data) {
            blueprint = data.blueprint;
            document.getElementById('type-modal').style.display = 'none';
            document.getElementById('sitetype-badge').innerText = data.sitetype.toUpperCase();
            
            renderSidebar();
            setupDragAndDrop();
            triggerAiSuggest();
        }

        window.triggerAiSuggest = () => {
            const btn = document.querySelector('button[onclick="triggerAiSuggest()"]');
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Bezig...';
            btn.disabled = true;

            fetch('/api/suggest-mapping', { method: 'POST' })
                .then(r => r.json())
                .then(suggestion => {
                    if (suggestion) applyMapping(suggestion);
                    btn.innerHTML = original;
                    btn.disabled = false;
                })
                .catch(() => {
                    btn.innerHTML = original;
                    btn.disabled = false;
                });
        };

        function renderSidebar() {
            const container = document.getElementById('data-fields');
            container.innerHTML = '';

            blueprint.data_structure.forEach(table => {
                const group = document.createElement('div');
                group.className = 'bg-slate-900/50 p-4 rounded-2xl border border-border hover:border-slate-600 transition-all';
                
                const header = document.createElement('div');
                header.className = 'flex items-center justify-between text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 cursor-grab active:cursor-grabbing hover:text-white transition-colors';
                header.innerHTML = `<span><i class="fa-solid fa-table text-accent"></i> ${table.table_name}</span> <i class="fa-solid fa-grip-lines text-slate-700"></i>`;
                header.draggable = true;
                header.dataset.tableName = table.table_name;
                header.dataset.type = 'table';
                group.appendChild(header);

                table.columns.forEach(col => {
                    const colName = typeof col === 'object' ? col.name : col;
                    const el = document.createElement('div');
                    el.className = 'draggable-field flex items-center justify-between group';
                    el.innerHTML = `<span>${colName}</span> <i class="fa-solid fa-plus opacity-0 group-hover:opacity-100 text-accent transition-opacity"></i>`;
                    el.draggable = true;
                    el.dataset.field = `${table.table_name}.${colName}`;
                    el.dataset.type = 'field';
                    group.appendChild(el);
                });

                container.appendChild(group);
            });
        }

        function setupDragAndDrop() {
            document.querySelectorAll('[draggable]').forEach(el => {
                el.addEventListener('dragstart', e => {
                    e.dataTransfer.setData('type', el.dataset.type);
                    e.dataTransfer.setData('payload', el.dataset.type === 'table' ? el.dataset.tableName : el.dataset.field);
                    el.classList.add('opacity-50');
                });
                el.addEventListener('dragend', () => el.classList.remove('opacity-50'));
            });

            document.querySelectorAll('.slot:not([data-slot-type="array"])').forEach(slot => {
                slot.addEventListener('dragover', e => {
                    e.preventDefault();
                    slot.classList.add('scale-[1.02]', 'border-accent');
                });
                slot.addEventListener('dragleave', () => slot.classList.remove('scale-[1.02]', 'border-accent'));
                slot.addEventListener('drop', e => {
                    e.preventDefault();
                    slot.classList.remove('scale-[1.02]', 'border-accent');
                    if (e.dataTransfer.getData('type') !== 'field') return;
                    
                    const field = e.dataTransfer.getData('payload');
                    slot.innerHTML = `<span class="text-success text-xs font-black uppercase tracking-tight flex items-center gap-2 animate-bounce"><i class="fa-solid fa-check"></i> ${field}</span>`;
                    slot.classList.add('mapped');
                    mapping[slot.dataset.slot] = field;
                });
            });

            const sectionContainer = document.getElementById('sections-container');
            sectionContainer.addEventListener('dragover', e => e.preventDefault());
            sectionContainer.addEventListener('drop', e => {
                e.preventDefault();
                if (e.dataTransfer.getData('type') !== 'table') return;
                const table = e.dataTransfer.getData('payload');
                if (!mapping.sections.includes(table)) {
                    mapping.sections.push(table);
                    renderSections();
                }
            });
        }

        function renderSections() {
            const container = document.getElementById('sections-container');
            const emptyState = `
                <div class="flex-1 flex flex-col items-center justify-center text-center opacity-30 pointer-events-none">
                    <i class="fa-solid fa-layer-group text-4xl mb-4"></i>
                    <p class="text-sm font-bold uppercase tracking-widest">Sleep tabellen hierheen om pagina-secties te genereren</p>
                </div>`;
            
            if (mapping.sections.length === 0) {
                container.innerHTML = emptyState;
                return;
            }

            container.innerHTML = mapping.sections.map(t => `
                <div class="bg-slate-800 p-4 rounded-2xl border border-border flex justify-between items-center shadow-lg animate-fadeIn">
                    <div class="flex items-center gap-4">
                        <span class="w-8 h-8 bg-success/20 text-success rounded-lg flex items-center justify-center text-xs"><i class="fa-solid fa-layer-group"></i></span>
                        <span class="text-sm font-bold text-white uppercase tracking-widest">${t}</span>
                    </div>
                    <button onclick="removeSection('${t}')" class="w-8 h-8 rounded-full hover:bg-red-500/20 text-red-500 transition-all flex items-center justify-center">
                        <i class="fa-solid fa-times"></i>
                    </button>
                </div>
            `).join('');
        }

        window.removeSection = (t) => {
            mapping.sections = mapping.sections.filter(x => x !== t);
            renderSections();
        };

        function applyMapping(suggestion) {
            Object.keys(suggestion).forEach(key => {
                if (key === 'sections') {
                    if (Array.isArray(suggestion.sections)) {
                        mapping.sections = suggestion.sections
                            .map(item => (typeof item === 'string' ? item : (item.table_name || item.name || null)))
                            .filter(item => item !== null);
                    }
                    renderSections();
                } else if (suggestion[key]) {
                    const slot = document.querySelector(`.slot[data-slot="${key}"]`);
                    if (slot) {
                        slot.innerHTML = `<span class="text-success text-xs font-black uppercase tracking-tight"><i class="fa-solid fa-check"></i> ${suggestion[key]}</span>`;
                        slot.classList.add('mapped');
                        mapping[key] = suggestion[key];
                    }
                }
            });
        }

        window.saveLayout = async () => {
            const name = document.getElementById('layout-name').value;
            if (!name) return alert("Geef een layout naam op!");

            const btn = document.getElementById('gen-btn');
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Bezig...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        layoutName: name,
                        mapping,
                        preferences: document.getElementById('style-prefs').value,
                        mode: document.getElementById('gen-mode').value
                    })
                });
                const r = await res.json();
                if (r.success) {
                    alert("✨ Succes! De layout '" + name + "' is gegenereerd.");
                } else alert("Fout: " + r.error);
            } catch(e) { alert("Netwerkfout"); }
            
            btn.innerHTML = original;
            btn.disabled = false;
        };

        init();
    </script>
</body>
</html>
