<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena CMS | Portfolio Health Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; transition: all 0.2s ease; }
        .card:hover { border-color: #3b82f6; transform: translateY(-2px); }
        .status-healthy { color: #10b981; }
        .status-warning { color: #f59e0b; }
        .status-broken { color: #ef4444; }
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .badge-healthy { background: #064e3b; color: #34d399; }
        .badge-warning { background: #78350f; color: #fbbf24; }
        .badge-broken { background: #7f1d1d; color: #f87171; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-12 border-b border-slate-700 pb-8">
            <div class="flex items-center gap-6">
                <div>
                    <h1 class="text-4xl font-black text-white tracking-tight">Ecosystem <span class="text-blue-500">Health</span></h1>
                    <p class="text-slate-400 mt-2">Real-time status van alle 60+ sites in de Athena CMS Factory.</p>
                </div>
                <div id="autopilot-status" class="bg-slate-800/50 border border-slate-700 p-4 rounded-2xl flex items-center gap-4">
                    <div class="w-3 h-3 rounded-full bg-slate-600" id="autopilot-dot"></div>
                    <div>
                        <div class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Autopilot</div>
                        <div class="text-xs font-bold text-slate-300" id="autopilot-text">Laden...</div>
                    </div>
                </div>
            </div>
            <div id="stats" class="flex gap-8 text-center">
                <!-- Stats worden hier geladen -->
            </div>
        </header>

        <div class="mb-8 flex justify-between items-center">
            <div class="relative w-96">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </span>
                <input type="text" id="search" onkeyup="filterSites()" class="bg-slate-800 border border-slate-700 text-white text-sm rounded-lg block w-full pl-10 p-2.5 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Site zoeken...">
            </div>
            <div class="flex gap-4">
                <button id="run-auto-btn" onclick="runAutopilotNow()" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-bold transition-all flex items-center gap-2 shadow-lg shadow-blue-500/20 active:scale-95">
                    <i class="fa-solid fa-bolt-lightning"></i>
                    Sync All Now
                </button>
                <div class="w-px h-8 bg-slate-700"></div>
                <div class="flex gap-2">
                    <button onclick="filterByStatus('all')" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm font-medium transition-colors text-slate-300">Alle</button>
                    <button onclick="filterByStatus('warning')" class="px-4 py-2 bg-amber-900/30 text-amber-400 hover:bg-amber-900/50 rounded-lg text-sm font-medium transition-colors">Issues</button>
                    <button onclick="filterByStatus('broken')" class="px-4 py-2 bg-red-900/30 text-red-400 hover:bg-red-900/50 rounded-lg text-sm font-medium transition-colors">Broken</button>
                </div>
            </div>
        </div>

        <div id="site-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Site cards worden hier geladen -->
        </div>
    </div>

    <script>
        let allSites = [];
        let activeServers = [];
        let currentFilter = 'all';

        async function loadData() {
            try {
                // Fetch site health data
                const siteResponse = await fetch('../../output/PORTFOLIO_PROGRESS.json');
                allSites = await siteResponse.json();

                // Fetch active servers
                try {
                    const serverResponse = await fetch('/api/servers/active');
                    const serverData = await serverResponse.json();
                    activeServers = serverData.servers || [];
                } catch (e) { console.warn("Kon actieve servers niet ophalen"); }

                // Fetch automation status
                try {
                    const autoRes = await fetch('/api/system/automation/status');
                    const autoData = await autoRes.json();
                    updateAutopilotUI(autoData);
                } catch (e) { console.warn("Kon autopilot status niet ophalen"); }

                updateStats();
                renderSites();
            } catch (err) {
                console.error("Fout bij laden van data:", err);
                document.getElementById('site-grid').innerHTML = '<div class="col-span-full text-center py-20 text-red-400">Fout bij laden van PORTFOLIO_PROGRESS.json. Draai de audit eerst.</div>';
            }
        }

        function updateAutopilotUI(data) {
            const dot = document.getElementById('autopilot-dot');
            const text = document.getElementById('autopilot-text');
            
            if (data.isRunning) {
                dot.className = 'w-3 h-3 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.6)]';
                text.innerHTML = `Actief <span class="opacity-40 mx-1">•</span> <span class="text-[10px]">${data.stats.updatesTriggered} updates</span>`;
            } else {
                dot.className = 'w-3 h-3 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)]';
                text.innerText = 'Gestopt';
            }
        }

        async function runAutopilotNow() {
            const btn = document.getElementById('run-auto-btn');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Bezig...';
            btn.classList.add('bg-blue-900/50', 'text-blue-200');

            try {
                const response = await fetch('/api/system/automation/run', { method: 'POST' });
                const result = await response.json();
                if (result.success) {
                    showToast("⚡ Handmatige sync voltooid!");
                    loadData(); // Refresh everything
                }
            } catch (e) {
                showToast("❌ Fout bij handmatige sync.");
            } finally {
                btn.innerHTML = originalContent;
                btn.disabled = false;
                btn.classList.remove('bg-blue-900/50', 'text-blue-200');
            }
        }

        function updateStats() {
            const stats = {
                total: allSites.length,
                healthy: allSites.filter(s => s.status === 'healthy').length,
                warning: allSites.filter(s => s.status === 'warning').length,
                live: activeServers.filter(s => s.type === 'preview').length
            };

            document.getElementById('stats').innerHTML = `
                <div>
                    <div class="text-3xl font-bold text-white">${stats.total}</div>
                    <div class="text-[10px] text-slate-500 uppercase tracking-widest font-black">Totaal</div>
                </div>
                <div>
                    <div class="text-3xl font-bold text-emerald-500">${stats.healthy}</div>
                    <div class="text-[10px] text-slate-500 uppercase tracking-widest font-black">Gezond</div>
                </div>
                <div>
                    <div class="text-3xl font-bold text-amber-500">${stats.warning}</div>
                    <div class="text-[10px] text-slate-500 uppercase tracking-widest font-black">Issues</div>
                </div>
                <div>
                    <div class="text-3xl font-bold text-blue-500">${stats.live}</div>
                    <div class="text-[10px] text-slate-500 uppercase tracking-widest font-black">Live</div>
                </div>
            `;
        }

        function renderSites() {
            const grid = document.getElementById('site-grid');
            const searchTerm = document.getElementById('search').value.toLowerCase();
            
            const filtered = allSites.filter(s => {
                const matchesSearch = s.site.toLowerCase().includes(searchTerm);
                const isLive = activeServers.some(srv => srv.siteName === s.site);
                const matchesStatus = currentFilter === 'all' || 
                                     (currentFilter === 'live' ? isLive : s.status === currentFilter);
                return matchesSearch && matchesStatus;
            });

            grid.innerHTML = filtered.map(site => {
                const activeServer = activeServers.find(srv => srv.siteName === site.site);
                const isLive = !!activeServer;

                return `
                <div class="card p-6 rounded-2xl flex flex-col h-full ${isLive ? 'ring-2 ring-blue-500/50' : ''}">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex flex-col truncate">
                            <h3 class="text-lg font-bold text-white truncate pr-2">${site.site}</h3>
                            ${isLive ? `<span class="text-[9px] text-blue-400 font-bold uppercase tracking-widest">Port: ${activeServer.port}</span>` : ''}
                        </div>
                        <div class="flex gap-2">
                            ${isLive ? '<span class="badge bg-blue-600 text-white animate-pulse">Live</span>' : ''}
                            <span class="badge badge-${site.status}">${site.status}</span>
                        </div>
                    </div>
                    
                    <div class="flex-grow">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="text-[10px] bg-slate-800 text-slate-400 px-2 py-1 rounded capitalize">${site.hydration}</span>
                            <span class="text-[10px] bg-slate-800 text-slate-400 px-2 py-1 rounded">${site.storage} MB</span>
                        </div>

                        ${site.issues.length > 0 ? `
                            <div class="mb-4">
                                <div class="text-[10px] text-slate-500 uppercase font-black mb-2 tracking-wider">Issues</div>
                                <ul class="text-xs space-y-1 text-slate-300">
                                    ${site.issues.map(issue => `<li class="flex items-start gap-2"><span class="text-amber-500 text-[8px] mt-1">●</span> ${issue}</li>`).join('')}
                                </ul>
                            <div class="mt-auto pt-6 flex flex-wrap gap-2">
                                <button onclick="cloneSite('${site.site}')" class="p-2 bg-slate-800 hover:bg-slate-700 text-slate-400 rounded-lg transition-colors font-bold flex items-center justify-center gap-2" title="Site Klonen">
                                    <i class="fa-solid fa-clone text-xs"></i>
                                </button>
                                <button onclick="healSite('${site.site}', this)" class="flex-grow text-center text-[10px] bg-emerald-900/20 text-emerald-400 border border-emerald-500/30 hover:bg-emerald-900/40 py-2 px-2 rounded-lg transition-colors font-bold flex items-center justify-center gap-2">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                                    Heal
                                </button>
                            ...
                            async function healSite(siteName, btn) {
                            ...
                            }

                            async function cloneSite(sourceId) {
                            const targetId = window.prompt(`Kloon project '${sourceId}' naar nieuwe naam:`, `${sourceId}-copy`);
                            if (!targetId || targetId === sourceId) return;

                            try {
                            const response = await fetch('/api/tools/clone', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ sourceId, targetId })
                            });
                            const result = await response.json();
                            if (result.success) {
                            showToast(`👯 Site succesvol gedupliceerd naar ${targetId}`);
                            // Refresh to see the new site
                            setTimeout(() => window.location.reload(), 2000);
                            } else {
                            alert("Fout bij klonen: " + result.error);
                            }
                            } catch (e) { console.error(e); }
                            }

                        <button onclick="buildSite('${site.site}', this)" class="flex-grow text-center text-[10px] bg-slate-800 hover:bg-slate-700 py-2 px-2 rounded-lg transition-colors font-bold flex items-center justify-center gap-2 text-slate-300">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                            Build
                        </button>
                        <a href="http://localhost:5001/reviewer.html?site=${site.site}" target="_blank" class="flex-grow text-center text-[10px] bg-slate-700 hover:bg-slate-600 py-2 px-2 rounded-lg transition-colors font-medium">Review</a>
                        <a href="http://localhost:5002/?site=${site.site}" target="_blank" class="flex-grow text-center text-[10px] bg-blue-600 hover:bg-blue-500 py-2 px-2 rounded-lg transition-colors font-bold text-white">Open Dock</a>
                    </div>
                </div>
            `}).join('');
        }

        async function healSite(siteName, btn) {
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<svg class="animate-spin h-3 w-3 text-emerald-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Healing...';

            try {
                const response = await fetch(`/api/sites/${siteName}/heal`, { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    const restored = result.results.restored.length;
                    const repaired = result.results.repaired.length;
                    const links = result.results.fixedLinks || 0;
                    const assets = result.results.assets?.length || 0;
                    showToast(`💖 ${siteName} geheeld: ${restored} data hersteld, ${repaired} gerepareerd, ${links} links gecorrigeerd, ${assets} assets hersteld.`);
                    
                    // Trigger refresh of data to update UI status
                    setTimeout(loadData, 1000);
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                console.error("Heal fout:", err);
                showToast(`❌ Heal mislukt: ${err.message}`);
            } finally {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }

        async function buildSite(siteName, btn) {
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<svg class="animate-spin h-3 w-3 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Building...';
            btn.classList.add('bg-blue-900/50', 'text-blue-200');

            try {
                const response = await fetch(`/api/sites/${siteName}/build`, { method: 'POST' });
                const result = await response.json();
                
                if (result.success) {
                    showToast(`✅ Build geslaagd voor ${siteName}`);
                    btn.classList.remove('bg-blue-900/50', 'text-blue-200');
                    btn.classList.add('bg-emerald-900/50', 'text-emerald-400');
                    setTimeout(() => {
                        btn.innerHTML = originalContent;
                        btn.disabled = false;
                        btn.classList.remove('bg-emerald-900/50', 'text-emerald-400');
                    }, 3000);
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                console.error("Build fout:", err);
                showToast(`❌ Build mislukt: ${err.message}`);
                btn.innerHTML = '⚠️ Fout';
                btn.classList.add('bg-red-900/50', 'text-red-400');
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                    btn.classList.remove('bg-red-900/50', 'text-red-400');
                }, 5000);
            }
        }

        function filterSites() { renderSites(); }
        function filterByStatus(status) { currentFilter = status; renderSites(); }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            toastMsg.innerText = msg;
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 3000);
        }

        // Auto-refresh every 10 seconds to keep Live status updated
        setInterval(loadData, 10000);

        loadData();
    </script>
</body>
</html>
