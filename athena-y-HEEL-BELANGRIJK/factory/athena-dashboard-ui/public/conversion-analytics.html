<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena CMS | Conversion Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .stat-card { background-color: #1e293b; border: 1px solid #334155; }
        .row-hover:hover { background-color: #1e293b; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-12 border-b border-slate-700 pb-8">
            <div>
                <h1 class="text-4xl font-black text-white tracking-tight">Conversion <span class="text-emerald-500">Analytics</span></h1>
                <p class="text-slate-400 mt-2">Performance tracking voor alle portfolio websites.</p>
            </div>
            <div id="aggregate-stats" class="flex gap-12">
                <!-- Aggregate stats load here -->
            </div>
        </header>

        <!-- Main Performance Table -->
        <div class="bg-slate-800/30 border border-slate-700 rounded-2xl overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-800/50 text-[10px] font-black uppercase tracking-widest text-slate-500 border-b border-slate-700">
                        <th class="px-6 py-4">Site</th>
                        <th class="px-6 py-4 text-center">Bezoekers</th>
                        <th class="px-6 py-4 text-center">Conversie</th>
                        <th class="px-6 py-4 text-center">Leads</th>
                        <th class="px-6 py-4 text-right">Omzet (Est.)</th>
                    </tr>
                </thead>
                <tbody id="metrics-body">
                    <!-- Metrics load here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadMetrics() {
            try {
                const response = await fetch('/api/analytics/portfolio');
                const data = await response.json();
                
                renderAggregate(data.aggregated);
                renderTable(data.details);
            } catch (err) {
                console.error("Fout bij laden van analytics:", err);
            }
        }

        function renderAggregate(agg) {
            document.getElementById('aggregate-stats').innerHTML = `
                <div class="text-center">
                    <div class="text-3xl font-bold text-white">${agg.totalVisitors.toLocaleString()}</div>
                    <div class="text-[10px] text-slate-500 uppercase tracking-widest font-black">Totaal Bezoekers</div>
                </div>
                <div class="text-center">
                    <div class="text-3xl font-bold text-emerald-500">${agg.totalLeads.toLocaleString()}</div>
                    <div class="text-[10px] text-slate-500 uppercase tracking-widest font-black">Totaal Leads</div>
                </div>
                <div class="text-center">
                    <div class="text-3xl font-bold text-blue-500">${agg.avgConversionRate}</div>
                    <div class="text-[10px] text-slate-500 uppercase tracking-widest font-black">Gem. Conversie</div>
                </div>
            `;
        }

        function renderTable(details) {
            const body = document.getElementById('metrics-body');
            body.innerHTML = details.sort((a,b) => b.metrics.leads - a.metrics.leads).map(site => `
                <tr class="row-hover border-b border-slate-700/50 transition-colors">
                    <td class="px-6 py-4 font-bold text-white text-sm">${site.siteId}</td>
                    <td class="px-6 py-4 text-center text-slate-400 font-mono text-xs">${site.metrics.visitors.toLocaleString()}</td>
                    <td class="px-6 py-4 text-center">
                        <div class="flex items-center justify-center gap-3">
                            <div class="w-24 bg-slate-700 h-1.5 rounded-full overflow-hidden">
                                <div class="bg-emerald-500 h-full" style="width: ${site.metrics.conversionRate}"></div>
                            </div>
                            <span class="text-xs font-bold text-emerald-400">${site.metrics.conversionRate}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-center font-black text-white">${site.metrics.leads}</td>
                    <td class="px-6 py-4 text-right text-sm font-bold text-blue-400">${site.metrics.stripeRevenue}</td>
                </tr>
            `).join('');
        }

        loadMetrics();
    </script>
</body>
</html>
