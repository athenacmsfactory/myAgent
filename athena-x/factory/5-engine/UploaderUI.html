<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; color: #1a1f23; }
    .dropzone {
      border: 3px dashed #d0d7de; border-radius: 12px; padding: 40px 20px;
      text-align: center; cursor: pointer; transition: all 0.2s; background: #f6f8fa;
    }
    .dropzone.dragover { border-color: #0969da; background: #ebf5ff; }
    .dropzone p { margin: 0; font-weight: 600; color: #57606a; }
    .status { margin-top: 20px; font-size: 14px; text-align: center; min-height: 20px; }
    .progress { height: 4px; width: 0%; background: #2da44e; margin-top: 10px; border-radius: 2px; transition: width 0.3s; }
    .file-info { font-size: 12px; color: #8c959f; margin-top: 8px; }
  </style>
</head>
<body>
  <h3>📸 Media Upload</h3>
  <p style="font-size: 13px; color: #57606a;">Sleep een afbeelding hieronder om deze direct aan uw website toe te voegen.</p>
  
  <div id="dropzone" class="dropzone">
    <p>Klik of sleep afbeeldingen hierheen</p>
    <input type="file" id="fileInput" style="display: none;" accept="image/*">
  </div>

  <div id="status" class="status"></div>
  <div id="progressBar" class="progress"></div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const progress = document.getElementById('progressBar');

    dropzone.onclick = () => fileInput.click();

    dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('dragover'); };
    dropzone.ondragleave = () => dropzone.classList.remove('dragover');
    dropzone.ondrop = (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      handleFile(e.dataTransfer.files[0]);
    };

    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    function handleFile(file) {
      if (!file) return;
      if (!file.type.startsWith('image/')) {
        status.innerHTML = "❌ Alleen afbeeldingen toegestaan.";
        return;
      }

      status.innerHTML = "⏳ Bezig met verwerken...";
      progress.style.width = "30%";

      const reader = new FileReader();
      reader.onload = function(e) {
        const base64Content = e.target.result.split(',')[1];
        
        google.script.run
          .withSuccessHandler((res) => {
            progress.style.width = "100%";
            status.innerHTML = "✅ <b>" + file.name + "</b> succesvol geüpload!";
            // Reset na 3 seconden
            setTimeout(() => { 
              status.innerHTML = ""; 
              progress.style.width = "0%";
            }, 5000);
          })
          .withFailureHandler((err) => {
            status.innerHTML = "❌ Fout: " + err;
            progress.style.width = "0%";
          })
          .processUpload(file.name, base64Content);
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
