<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena Site Reviewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --sidebar-width: 300px; }
        body { background-color: #0f172a; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        
        .sidebar { 
            width: var(--sidebar-width); 
            background-color: #1e293b; 
            border-right: 1px solid #334155; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            transition: width 0.3s ease-in-out;
            position: relative;
            z-index: 10;
        }
        
        .sidebar.collapsed { width: 0; overflow: hidden; border-right: none; }
        
        .resizer {
            width: 6px;
            height: 100vh;
            cursor: col-resize;
            background: transparent;
            position: absolute;
            right: -3px;
            top: 0;
            z-index: 20;
            transition: background 0.2s;
        }
        .resizer:hover, .resizer.dragging { background: rgba(59, 130, 246, 0.5); }

        .main-view { flex-grow: 1; height: 100vh; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
        
        .site-item { padding: 12px; border-bottom: 1px solid #334155; cursor: pointer; transition: background 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .site-item:hover { background-color: #334155; }
        .site-item.active { background-color: #3b82f6; color: white; }
        
        .status-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-top: 4px; display: inline-block; }
        .status-loading { background: #f59e0b; color: #000; }
        .status-ready { background: #10b981; color: #fff; }
        .status-error { background: #ef4444; color: #fff; }
        
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Disable transitions during drag */
        .no-transition { transition: none !important; }
    </style>
</head>
<body class="flex">

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="p-4 border-b border-slate-700 shrink-0">
            <h1 class="text-xl font-bold text-blue-400">Athena Reviewer</h1>
            <p id="progress-text" class="text-xs text-slate-400 mt-1">Laden van sites...</p>
        </div>
        
        <div id="site-list" class="flex-grow overflow-y-auto">
            <!-- Sites worden hier geladen -->
        </div>

        <div class="p-4 bg-slate-900 flex justify-between gap-2 shrink-0">
            <button onclick="prevSite()" class="bg-slate-700 hover:bg-slate-600 px-3 py-2 rounded text-xs flex-grow">Vorige</button>
            <button onclick="nextSite()" class="bg-blue-600 hover:bg-blue-500 px-3 py-2 rounded text-xs flex-grow font-bold">Volgende</button>
        </div>

        <!-- Resize Handle -->
        <div id="resizer" class="resizer"></div>
    </div>

    <!-- Main Content -->
    <div class="main-view">
        <!-- Toolbar -->
        <div class="h-12 bg-slate-800 flex items-center justify-between px-4 border-b border-slate-700 shrink-0">
            <div class="flex items-center">
                <button onclick="toggleSidebar()" class="mr-4 text-slate-400 hover:text-white p-1 rounded hover:bg-slate-700" title="Zijbalk in-/uitklappen">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <span id="current-site-name" class="font-medium mr-4 text-blue-300">Selecteer een site</span>
                <div id="site-status-container" class="hidden">
                    <span id="site-status-spinner" class="loader"></span>
                    <span id="site-status-text" class="text-sm">Opstarten...</span>
                </div>
            </div>
            <div class="flex gap-4">
                <button id="open-dock-btn" onclick="openInDock()" class="hidden text-xs bg-purple-600 px-3 py-1 rounded hover:bg-purple-500">Open in Dock</button>
                <button id="external-btn" onclick="openExternal()" class="hidden text-xs bg-slate-600 px-3 py-1 rounded hover:bg-slate-500">Nieuw Tabblad</button>
            </div>
        </div>

        <!-- Site Frame -->
        <div class="flex-grow bg-slate-900 relative">
            <div id="placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 text-center p-8">
                <svg class="w-20 h-20 mb-4 opacity-20" fill="currentColor" viewBox="0 0 20 20"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>
                <h2 class="text-2xl font-bold">Klaar voor de start?</h2>
                <p class="mt-2 max-w-md">Klik op een site in de lijst of op de 'Volgende' knop om de review te starten. Wij regelen de installatie en het opstarten.</p>
            </div>
            <iframe id="site-frame" class="hidden" src="about:blank"></iframe>
        </div>
    </div>

    <script>
        let sites = [];
        let currentIndex = -1;
        const API_BASE = window.location.origin;

        // Elements
        const sidebar = document.getElementById('sidebar');
        const resizer = document.getElementById('resizer');
        const root = document.documentElement;

        // 🛠️ Sidebar Resizing Logic
        let isResizing = false;

        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
            sidebar.classList.add('no-transition');
            resizer.classList.add('dragging');
            
            // Voorkom tekst selectie tijdens drag
            document.body.style.userSelect = 'none';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            
            let newWidth = e.clientX;
            if (newWidth < 200) newWidth = 200;
            if (newWidth > 600) newWidth = 600;
            
            root.style.setProperty('--sidebar-width', `${newWidth}px`);
            localStorage.setItem('reviewer-sidebar-width', newWidth);
        });

        window.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                document.body.style.cursor = 'default';
                sidebar.classList.remove('no-transition');
                resizer.classList.remove('dragging');
                document.body.style.userSelect = 'auto';
            }
        });

        // 🛠️ Toggle Sidebar
        function toggleSidebar() {
            const isCollapsed = sidebar.classList.toggle('collapsed');
            localStorage.setItem('reviewer-sidebar-collapsed', isCollapsed);
        }

        // Initialize Settings from LocalStorage
        function initSettings() {
            const savedWidth = localStorage.getItem('reviewer-sidebar-width');
            if (savedWidth) {
                root.style.setProperty('--sidebar-width', `${savedWidth}px`);
            }
            
            const isCollapsed = localStorage.getItem('reviewer-sidebar-collapsed') === 'true';
            if (isCollapsed) {
                sidebar.classList.add('collapsed');
            }
        }

        // ⚓ Athena Message Interceptor
        window.addEventListener('message', (event) => {
            const { type } = event.data;
            if (type === 'SITE_CLICK') {
                console.log("⚓ Reviewer Intercepted SITE_CLICK:", event.data);
                // In de reviewer doen we hier niets mee, behalve voorkomen dat het systeem 
                // denkt dat we in de 'Dock' zitten en gekke dingen gaat doen.
            }
        });

        async function loadSites() {
            try {
                const response = await fetch(`${API_BASE}/api/sites`);
                const data = await response.json();
                sites = data;
                renderList();
                updateProgress();
            } catch (err) {
                console.error("Fout bij laden sites:", err);
            }
        }

        function renderList() {
            const list = document.getElementById('site-list');
            list.innerHTML = sites.map((site, index) => `
                <div class="site-item ${index === currentIndex ? 'active' : ''}" onclick="selectSite(${index})">
                    <div class="font-medium">${site.name}</div>
                    <div class="text-xs opacity-60">${site.siteType || 'Unknown Type'}</div>
                    <div id="badge-${index}" class="status-badge hidden"></div>
                </div>
            `).join('');
        }

        function updateProgress() {
            const text = document.getElementById('progress-text');
            if (currentIndex === -1) {
                text.innerText = `${sites.length} sites gevonden.`;
            } else {
                text.innerText = `Site ${currentIndex + 1} van ${sites.length}`;
            }
        }

        async function selectSite(index) {
            if (index < 0 || index >= sites.length) return;
            
            currentIndex = index;
            renderList();
            updateProgress();
            
            const site = sites[index];
            document.getElementById('current-site-name').innerText = site.name;
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('site-frame').classList.add('hidden');
            document.getElementById('site-status-container').classList.remove('hidden');
            document.getElementById('site-status-spinner').classList.remove('hidden');
            document.getElementById('site-status-text').innerText = "Opstarten...";
            document.getElementById('site-status-text').className = "text-sm";
            
            document.getElementById('open-dock-btn').classList.add('hidden');
            document.getElementById('external-btn').classList.add('hidden');

            try {
                const response = await fetch(`${API_BASE}/api/sites/${site.name}/preview`, { method: 'POST' });
                const result = await response.json();

                if (result.success) {
                    checkHealth(result.url);
                } else {
                    showError("Start mislukt: " + (result.error || "Onbekende fout"));
                }
            } catch (err) {
                showError("Verbindingsfout");
            }
        }

        function checkHealth(url) {
            let attempts = 0;
            const maxAttempts = 30;

            const timer = setInterval(async () => {
                attempts++;
                try {
                    const res = await fetch(url, { mode: 'no-cors' });
                    clearInterval(timer);
                    showReady(url);
                } catch (e) {
                    if (attempts >= maxAttempts) {
                        clearInterval(timer);
                        showError("Timeout: Site start niet op.");
                    }
                    document.getElementById('site-status-text').innerText = `Laden... (${attempts}s)`;
                }
            }, 1000);
        }

        function showReady(url) {
            document.getElementById('site-status-spinner').classList.add('hidden');
            document.getElementById('site-status-text').innerText = "Gereed";
            document.getElementById('site-status-text').className = "text-sm text-green-400";
            
            const frame = document.getElementById('site-frame');
            frame.src = url;
            frame.classList.remove('hidden');

            document.getElementById('open-dock-btn').classList.remove('hidden');
            document.getElementById('external-btn').classList.remove('hidden');

            // 🛠️ Inject functional test handler
            setTimeout(() => {
                try {
                    const doc = frame.contentWindow.document;
                    doc.addEventListener('click', (e) => {
                        const link = e.target.closest('a');
                        if (link && e.shiftKey) {
                            console.log("🛠️ Reviewer: Handling functional link click:", link.getAttribute('href'));
                            const href = link.getAttribute('href');
                            if (href.startsWith('#')) {
                                e.preventDefault();
                                const targetId = href.substring(1);
                                const targetEl = doc.getElementById(targetId);
                                if (targetEl) {
                                    targetEl.scrollIntoView({ behavior: 'smooth' });
                                }
                            }
                        }
                    }, true);
                } catch (err) {
                    console.warn("Kon test-handler niet injecteren (mogelijk CORS):", err);
                }
            }, 2000);
        }

        function showError(msg) {
            document.getElementById('site-status-spinner').classList.add('hidden');
            document.getElementById('site-status-text').innerText = msg;
            document.getElementById('site-status-text').className = "text-sm text-red-400";
        }

        function nextSite() {
            selectSite(currentIndex + 1);
        }

        function prevSite() {
            selectSite(currentIndex - 1);
        }

        function openInDock() {
            const site = sites[currentIndex];
            window.open(`http://localhost:5002/?site=${site.name}`, '_blank');
        }

        function openExternal() {
            const frame = document.getElementById('site-frame');
            window.open(frame.src, '_blank');
        }

        // Init
        initSettings();
        loadSites();
    </script>
</body>
</html>
